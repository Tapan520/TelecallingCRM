{% extends 'base.html' %}
{% block title %}{% if lead %}Edit Lead{% else %}New Lead{% endif %} – Telecalling CRM{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('leads_list') }}" class="btn btn-sm btn-outline-secondary me-2">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0">
    {% if lead %}Edit Lead: {{ lead.name }}{% else %}New Lead{% endif %}
  </h4>
</div>

<div class="card" style="max-width: 640px;">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control"
                 value="{{ lead.name if lead else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Phone <span class="text-danger">*</span></label>
          <input type="tel" name="phone" class="form-control"
                 value="{{ lead.phone if lead else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ lead.email if lead and lead.email else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Company</label>
          <input type="text" name="company" class="form-control"
                 value="{{ lead.company if lead and lead.company else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Source</label>
          <select name="source" class="form-select">
            <option value="">— Select —</option>
            {% for s in sources %}
            <option value="{{ s }}" {% if lead and lead.source == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            {% for s in statuses %}
            <option value="{{ s }}" {% if lead and lead.status == s %}selected{% elif not lead and s == 'New' %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ lead.notes if lead and lead.notes else '' }}</textarea>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>{% if lead %}Save Changes{% else %}Add Lead{% endif %}
          </button>
          <a href="{{ url_for('leads_list') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
